name: Release Validation

on:
  workflow_dispatch:
    inputs:
      artifacts-dir:
        description: "Release artifact folder to validate"
        required: true
        default: "dist\\installer"

permissions:
  contents: read

jobs:
  validate:
    name: Validate staged release artifacts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validator dependencies
        run: python -m pip install -e .[test]

      - name: Run release validation without publishing
        shell: pwsh
        run: .\scripts\write_sha256sums.ps1 -ArtifactsDir "${{ inputs.artifacts-dir }}" -ValidateOnly
