# Windows-safe base config marker.
#
# One-split support is intentionally secondary until two-split inference is
# proven end-to-end on Windows CUDA.
model_mode: onesplit
source_config: ../ensemble_2split_sampling.yaml
windows_overrides:
  trainer:
    accelerator: gpu
    strategy: auto
    devices: 1
    num_nodes: 1
    precision: 32-true
    plugins: null
  data:
    num_workers: 0
    batch_size: 1

