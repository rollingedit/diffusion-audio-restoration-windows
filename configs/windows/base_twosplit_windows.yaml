# Windows-safe base config marker.
#
# The current config builder sanitizes configs/ensemble_2split_sampling.yaml so
# it can preserve NVIDIA's full model shape while replacing Linux/HPC defaults.
# This file exists as the stable product config target for future hardening.
model_mode: twosplit
source_config: ../ensemble_2split_sampling.yaml
windows_overrides:
  trainer:
    accelerator: gpu
    strategy: auto
    devices: 1
    num_nodes: 1
    precision: 32-true
    plugins: null
  data:
    num_workers: 0
    batch_size: 1

